# ============================================================================
# Toy Board — full local stack (app + infra + observability + load)
#
# Usage
#   docker compose up -d --build                # 2 app replicas by default
#   docker compose up -d --build --scale app=4  # scale out horizontally
#   docker compose --profile load run --rm k6 run /scripts/board-load.js
#   docker compose down                         # stop
#   docker compose down -v                      # stop + drop volumes
#
# Ports on host:
#   8080  nginx (entry point — all app traffic)
#   3000  grafana
#   9090  prometheus
#   3306  mysql
#   6379  redis
# ============================================================================

services:

  # ---------- Infra ----------
  mysql:
    image: mysql:8.0.38
    container_name: toy-board-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: toy_board
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./ops/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks: [board]

  redis:
    image: redis:7.4
    container_name: toy-board-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [board]

  kafka:
    image: apache/kafka:3.8.0
    container_name: toy-board-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [board]

  # ---------- Application (horizontally scalable) ----------
  write-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: app-write
    image: toy-board-write:local
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/toy_board?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 30
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      SERVER_PORT: 8080
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    networks: [board]

  read-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: app-read
    image: toy-board-read:local
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      write-app: { condition: service_started }
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: toy-board-app-read
      ENDPOINTS_TOY_BOARD_WRITE_APP_URL: http://write-app:8080
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      SERVER_PORT: 8080
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s
    networks: [board]

  # ---------- Load balancer ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: toy-board-nginx
    depends_on: [write-app, read-app]
    ports:
      - "8080:80"
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [board]

  # ---------- Observability ----------
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: toy-board-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./perf/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=3d
    restart: unless-stopped
    networks: [board]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: toy-board-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./perf/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus]
    restart: unless-stopped
    networks: [board]

  # ---------- Load generator (on-demand) ----------
  k6:
    image: grafana/k6:0.54.0
    container_name: toy-board-k6
    profiles: ["load"]
    depends_on: [nginx]
    volumes:
      - ./perf/k6:/scripts:ro
      - ./perf/results:/results
    environment:
      BASE_URL: http://nginx:80
    entrypoint: ["k6"]
    command: ["run", "/scripts/board-load.js"]
    networks: [board]

networks:
  board:
    driver: bridge

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
  kafka-data:
