worker_processes auto;
events { worker_connections 2048; }

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  log_format main '$remote_addr "$request" $status ${request_time}s upstream=$upstream_addr ua="$http_user_agent"';
  access_log /dev/stdout main;
  error_log  /dev/stderr warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  server {
    listen 80;
    server_name _;

    location = /nginx-health { return 200 "ok\n"; add_header Content-Type text/plain; }

    # GET /v1/articles* -> article-read, other methods -> write-app
    location ~ ^/v1/articles {
      set $backend "article-read:8080";
      if ($request_method != GET) {
        set $backend "write-app:8080";
      }
      proxy_pass http://$backend;

      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 3s;
      proxy_send_timeout   30s;
      proxy_read_timeout   30s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # GET /v1/hot-articles*, GET /v2/comments* -> sub-read, other methods -> write-app
    location ~ ^/(v1/hot-articles|v2/comments) {
      set $backend "sub-read:8080";
      if ($request_method != GET) {
        set $backend "write-app:8080";
      }
      proxy_pass http://$backend;

      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 3s;
      proxy_send_timeout   30s;
      proxy_read_timeout   30s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    # Default: write-app
    location / {
      set $backend "write-app:8080";
      proxy_pass http://$backend;

      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 3s;
      proxy_send_timeout   30s;
      proxy_read_timeout   30s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
