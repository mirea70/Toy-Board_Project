global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  # Toy Board app — discover every replica via Docker's embedded DNS.
  # Compose service names return A records for ALL replicas, so Prometheus
  # scrapes each container directly. Use `service` label to distinguish.
  - job_name: toy-board-write
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: [write-app]
        type: A
        port: 8080
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: write-app

  - job_name: toy-board-article-read
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: [article-read]
        type: A
        port: 8080
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: article-read

  - job_name: toy-board-sub-read
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: [sub-read]
        type: A
        port: 8080
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: sub-read

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
