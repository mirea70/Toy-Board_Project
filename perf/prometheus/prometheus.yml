global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  # Toy Board write-app & read-app — discover every replica via Docker's embedded DNS.
  # Compose service names return A records for ALL replicas (e.g. read-app=2 yields 2 IPs),
  # so Prometheus scrapes each container directly. Use `service` label to distinguish.
  - job_name: toy-board-write
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: [write-app]
        type: A
        port: 8080
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: write-app

  - job_name: toy-board-read
    metrics_path: /actuator/prometheus
    dns_sd_configs:
      - names: [read-app]
        type: A
        port: 8080
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: service
        replacement: read-app

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
